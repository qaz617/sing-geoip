name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Get latest go version
        id: version
        run: |
          go_version=$(curl -s https://raw.githubusercontent.com/actions/go-versions/main/versions-manifest.json \
            | grep -oE '\"version\":\s*\"[^\"]+\"' \
            | head -n1 \
            | sed -E 's/.*\"([^\"]+)\".*/\1/')
          echo "go_version=$go_version" >> $GITHUB_OUTPUT
      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ steps.version.outputs.go_version }}
      - name: Build geoip
        id: build
        env:
          NO_SKIP: true
        run: go run -v .
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geoip.db
          path: geoip.db
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geoip-lite.db
          path: geoip-lite.db
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geoip-cn.db
          path: geoip-cn.db
